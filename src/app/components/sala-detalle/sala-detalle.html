<nav class="navbar-sala">
  <button [class.activo]="vistaActual === 'muro'" (click)="cambiarVista('muro')">
    Muro de comentarios
  </button>
  <button [class.activo]="vistaActual === 'votaciones'" (click)="cambiarVista('votaciones')">
    Votaciones
  </button>
  <button [class.activo]="vistaActual === 'pizarra'" (click)="cambiarVista('pizarra')">
    Pizarra de dibujo
  </button>
  <button [class.activo]="vistaActual === 'fotos'" (click)="cambiarVista('fotos')">Galería</button>
</nav>

<div class="contenedor-sala">
  <div *ngIf="vistaActual === 'muro'" class="modulo-muro">
    <div class="muro contenedor-mensajes" #scrollMe>
      <div
        class="mensaje"
        *ngFor="let msg of mensajes"
        [class.mensaje-propio]="msg.idUsuario === miUsuarioId"
      >
        <div class="datos-autor">
          <img *ngIf="msg.avatar" [src]="msg.avatar" alt="Avatar" class="avatar-msg" />

          <strong>{{ msg.nombreAutor }}</strong>
          <span class="fecha">{{ msg.fechaEnvio | date: 'dd/MM HH:mm' }}</span>
        </div>
        <p class="texto">{{ msg.texto }}</p>
      </div>

      <div *ngIf="mensajes.length === 0" class="mensaje-vacio">
        Aún no hay mensajes. ¡Escribe el primero!
      </div>
    </div>

    <div class="caja-envio">
      <input
        type="text"
        [(ngModel)]="nuevoMensaje"
        placeholder="Escribe un comentario..."
        (keyup.enter)="enviarMensaje()"
      />
      <button (click)="enviarMensaje()">Enviar</button>
    </div>
  </div>

  <div *ngIf="vistaActual === 'votaciones'" class="modulo-placeholder">
    <app-votacion></app-votacion>
  </div>

  <div *ngIf="vistaActual === 'pizarra'" class="modulo-pizarra">
    <div class="herramientas-pizarra">
      <button (click)="limpiarPizarra()" class="btn-herramienta btn-borrar">
        <img src="assets/papelera.png" alt="Borrar" class="icono-herramienta"> Borrar
      </button>
      
      <button (click)="guardarDibujo()" class="btn-herramienta btn-guardar">
        <img src="assets/publicar.png" alt="Publicar" class="icono-herramienta"> Publicar
      </button>

      <input type="color" [(ngModel)]="colorPizarra" (change)="actualizarPincel()" />
      <input
        type="range"
        min="1"
        max="20"
        [(ngModel)]="grosorPincel"
        (change)="actualizarPincel()"
      />
      <span>{{ grosorPincel }}px</span>
    </div>

    <div class="contenedor-canvas">
      <canvas
        #canvasPizarra
        width="800"
        height="400"
        (mousedown)="empezarDibujo($event)"
        (mousemove)="dibujar($event)"
        (mouseup)="terminarDibujo()"
        (mouseleave)="terminarDibujo()"
        (touchstart)="empezarDibujo($event)"
        (touchmove)="dibujar($event)"
        (touchend)="terminarDibujo()"
        (touchcancel)="terminarDibujo()"
      >
      </canvas>
    </div>
  </div>

  <div *ngIf="vistaActual === 'fotos'" class="modulo-muro">
    <div class="upload-section">
      <input
        type="file"
        #fileInput
        (change)="onFileSelected($event)"
        accept="image/*"
        style="display: none"
      />

      <button *ngIf="!imagenPrevia" class="btn-seleccionar-foto" (click)="fileInput.click()">
        <img src="assets/camara.png" alt="Cámara" class="icono-camara"> Añadir nueva foto
      </button>

      <div *ngIf="imagenPrevia" class="preview-container">
        <img [src]="imagenPrevia" alt="Vista previa" class="img-preview" />
        <div class="preview-actions">
          <button class="btn-cancelar" (click)="cancelarSubida()">Cancelar</button>
          <button class="btn-confirmar" (click)="subirFoto()" [disabled]="subiendo">
            {{ subiendo ? 'Subiendo...' : 'Publicar Foto' }}
          </button>
        </div>
      </div>
    </div>
    <div class="carrusel-dibujos" style="flex-wrap: wrap">
      <div class="dibujo-card" *ngFor="let img of imagenesGaleria">
        <img
          [src]="img.imagenBase64"
          alt="Foto"
          (click)="abrirImagen(img.imagenBase64)"
          class="img-clickable"
        />
        <div class="info-dibujo">
          <strong>{{ img.autor?.nombre }}</strong>

          <button
            *ngIf="img.autor?.id == miUsuarioId"
            class="icon-btn-borrar"
            title="Eliminar foto"
            (click)="confirmarBorradoFoto(img.id)"
          >
            <img src="assets/papelera.png" alt="Borrar" class="icono-papelera" />
          </button>
        </div>
      </div>

      <div *ngIf="imagenesGaleria.length === 0" class="alert-info" style="width: 100%">
        <p>Aún no hay fotos en esta sala. ¡Sube la primera!</p>
      </div>
    </div>
  </div>
</div>
<div *ngIf="imagenSeleccionada" class="modal-fullscreen" (click)="cerrarImagen()">
  <span class="btn-cerrar-modal">&times;</span>

  <img [src]="imagenSeleccionada" alt="Imagen ampliada" (click)="$event.stopPropagation()" />
</div>
